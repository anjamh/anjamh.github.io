  <!-- JS -->
  <script>
    const menu = document.getElementById("menu");
    const menuPanel = document.getElementById("menuPanel");
    const credits = document.getElementById("credits");
    const body = document.body;
    const track = document.getElementById("track");

    let assetsReady = false;

    function toggleCredits() {
      body.classList.toggle("credits-mode");
      credits.classList.toggle("active");
    }
    

 

    // MENU hover open/close
    menu.addEventListener("mouseenter", () => {
      menuPanel.classList.add("open");
    });

    menu.addEventListener("mouseleave", () => {
      menuPanel.classList.remove("open");
    });

    // click outside closes everything
    document.addEventListener("click", (e) => {
      const isMenu = e.target.closest(".menu");
      const isCredits = e.target.closest(".credits");

      if (!isMenu && !isCredits) {
        menuPanel.classList.remove("open");
        body.classList.remove("credits-mode");
        credits.classList.remove("active");
      }
    });

    // =========================
    // IMAGE PRELOAD SYSTEM
    // =========================

    const imageSources = [
      "images/image1.jpg",
      "images/image2.jpg",
      "images/image3.jpg",
      "images/image4.jpg",
      "images/image5.jpg",
      "images/image6.jpg",
      "images/image7.jpg",
      "images/image8.jpg",
      "images/image9.jpg"
    ];

    function preloadImages(sources, callback) {
      let loaded = 0;

      sources.forEach(src => {
        const img = new Image();
        img.src = src;

        img.onload = () => {
          loaded++;
          if (loaded === sources.length) callback();
        };
      });
    }

    function startMarquee() {
      const tracks = [
        document.getElementById("track"),              // desktop
        document.querySelector(".v-track")             // mobile
      ];
    
      tracks.forEach(track => {
        if (!track) return;
    
        track.style.transform = "translate(0, 0)";
        
        
        
      });
    }

    // =========================
    // INIT SEQUENCE
    // =========================

    window.addEventListener("load", () => {
      preloadImages(imageSources, () => {
        startMarquee();
    
        // fade out loader AFTER everything is ready
        const loader = document.querySelector(".page-loader");

        if (loader) {
          loader.style.opacity = "0";
          loader.style.pointerEvents = "none";
        }
      });
    });
    
  </script>
